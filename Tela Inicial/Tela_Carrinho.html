<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css.css">
</head>
<body>
<!-- 
    width: Largura
    height: Altura    
-->
<!-- Tabela de produtos -->
    <table border="" align="right" style=" width: 50%; height: 99vh;" class="bordatabela">
        <tr>
<!-- Imagem do carrinho -->
            <th style="height: 50%; height: 10vh;">
                <img src="Carrinho de supermercado.png" width="10%" height="100%">
            </th>
        </tr>
<!-- Itens -->
        <tr>
            <td style="height: 50%; height: 69vh;">
                
            </td>
        </tr>
    </table>
<!-- Tabela de dados do cliente -->
    <table border="" style="width: 50%; height: 79vh; border-radius: 30px;">
        <tr style="height: 10%;">
<!-- Telefone -->
            <td style="font-size: 4vh;">
                Telefone:
            </td>
<!-- Caixa de texto do telefone -->
            <td align="center">
                <input type="text" name="telefone" id="telefone" placeholder="Digite seu telefone" style="font-size: 5vh;">
            </td>
        </tr>
        <tr style="height: 10%;">
<!-- Nome -->
            <td style="font-size: 4vh;">
                Nome:
            </td>
<!-- Caixa de texto do nome -->            
            <td align="center">
                <input type="text" name="nome" id="nome" placeholder="Digite seu nome" style="font-size: 5vh;">
            </td>
        </tr>
        <tr style="height: 10%;">
<!-- Forma de pagamento -->
            <td style="font-size: 4vh;">
                forma de pagamento:
            </td>
<!-- Caixa de seleção da forma de pagamento -->
            <td align="center">
                <select name="pagamento" id="pagamento" style="font-size: 5vh;">
                    <option value="dinheiro">Dinheiro</option>
                    <option value="cartao">Cartão de crédito/débito</option>
                    <option value="pix">Pix</option>
                    <option value="crediario">Crediário</option>
                </select>
            </td>
        </tr>
<!-- Espaçamento -->
        <tr style="height: 70%;">
        </tr>
    </table>    
<!-- Tabela de desconto e total -->
    <table border="1" style=" width: 50%; height: 20vh; border-radius: 30px;">
        <tr>
<!-- Desconto -->
            <th style="font-size: 4vh;">
                Desconto:
            </th>
<!-- Valor do desconto -->
            <td style="font-size: 4vh;">
                R$00,00
            </td>
        </tr>
<!-- Total -->
        <tr>
            <th style="font-size: 4vh;">
                Total:
            </th>
<!-- Valor total -->
            <td style="font-size: 4vh;">
                R$00,00
            </td>
        </tr>
    </table>
</body>
</html>
