<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css.css">
    <script src="Script.js"></script>
</head>
<body class="fundo"> 
<!-- width: Largura  height: Altura -->
<!-- Tabela de produtos -->
    <table border="" align="right" style=" width: 49%; height: 97vh; background-color: rgb(255, 255, 255);" class="bordatabela">
        <tr>
<!-- Imagem do carrinho -->
            <th style="width: 50%; height: 10vh;">
                <img src="Imagens/Carrinho de supermercado.png" width="10%" height="90vh">
            </th>
        </tr>
<!-- Itens -->
        <tr>
            <td style="height: 50%; height: 69vh; border-bottom: none;">
                
            </td>
        </tr>
    </table>


<!-- Tabela de dados do cliente -->
    <table border="" style="width:50%; height: 75vh; border-radius: 30px;  background-color: rgb(255, 255, 255);">
        <tr style="height: 10%;">
<!-- Telefone -->
            <td style="font-size: 4vh;" align="center">
                Telefone:
            </td>
<!-- Caixa de texto do telefone -->
            <td align="center" align="center">
                <input type="text" name="telefone" id="telefone" placeholder="Digite seu telefone" style="font-size: 5vh; border-radius: 5px;">
            </td>
        </tr>
        <tr style="height: 10%;">
<!-- Nome -->
            <td style="font-size: 4vh;" align="center">
                Nome:
            </td>
<!-- Caixa de texto do nome -->            
            <td align="center" align="center">
                <input type="text" name="nome" id="nome" placeholder="Digite seu nome" style="font-size: 5vh; border-radius: 5px;">
            </td>
        </tr>
<!-- CPF -->
            <td style="font-size: 4vh;" align="center">
                CPF:
            </td>
<!-- Caixa de texto do CPF -->            
            <td align="center" align="center">
                <input type="text" name="cpf" id="cpf" placeholder="XXX.XXX.XXX-XX" style="font-size: 5vh; border-radius: 5px;">
            </td>
        </tr>
        <tr style="height: 10%;">
<!-- Forma de pagamento -->
            <td style="font-size: 4vh;" align="center">
                Forma de pagamento:
            </td>
<!-- Caixa de seleção da forma de pagamento -->
            <td align="center">
                <select name="pagamento" id="pagamento" style="font-size: 5vh; border-radius: 10px;" onclick="formadepagamento()">
                    <option value="Dinheiro"> Dinheiro </option>
                    <option value="Cartão"> Cartão de crédito/débito </option>
                    <option value="Pix"> Pix </option>
                    <option value="Crediário"> Crediário </option>
                </select>
            </td>
<!-- Espaçamento -->
        <tr style="height: 70%;">
        </tr>
        <tr>
            <td colspan="2" style="border-bottom: none;">
                <button onclick="finalizarPedido() " style="font-size: 4vh; width: 100%; height: 10vh; border-radius: 30px;">
                    Finalizar pedido
                </button>
            </td>
        </tr>
    </table>  
    <br>
<!-- Tabela de desconto e total -->
    <table border="1" style=" width: 50%; height: 20vh; border-radius: 30px; background-color: rgb(255, 255, 255);" >
        <tr>
<!-- Desconto -->
            <th style="font-size: 4vh;">
                Desconto:
            </th>
<!-- Valor do desconto -->
            <td style="font-size: 4vh;">
                R$00,00
            </td>
        </tr>
<!-- Total -->
        <tr>
            <th style="font-size: 4vh; border-bottom: none; color: #000000;">
                Total:
            </th>
<!-- Valor total -->
            <td style="font-size: 4vh; border-bottom: none;">
                R$00,00
            </td>
        </tr>
    </table>
</body>
</html>
