<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<!-- Botão de Cadastrar -->
    <div align="right">
        <input type="button" value="Cadastrar" style="height: 50px; width: 75px;" onclick="window.location.href='Tela_Cadastro.html'">
    </div>
    <table align="center">
        <tr>
<!-- Logo -->
            <td colspan="2">
                <img src="Logo.png" width="200" height="200">
            </td>
        </tr>
        <tr>
<!-- Email -->
            <td style="font-size: 20px;">
                Email:
            </td>
        </tr>
        <tr>
            <td>
<!-- caixa de texto do email -->
                <input type="email" name="Email" id="Email" placeholder="Digite seu email">
            </td>
        </tr>
        <tr>
<!-- Senha -->
            <td style="font-size: 20px;">
                Senha:
            </td>
        </tr>
        <tr>
            <td>
<!-- Caixa de texto da senha -->
                <input type="password" name="Senha" id="Senha" placeholder="Digite sua senha">
            </td>
        </tr>
<!-- Espaçamento -->
        <tr style="height:20px;"></tr>
        <tr>
<!-- Botão de Entrar -->
            <td align="center">
                <input type="button" value="Entrar" style="font-size: 30px;" onclick="window.location.href='Tela_Inicial.html'">
            </td>
        </tr>
    </table>
</body>
</html>
