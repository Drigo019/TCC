<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css.css">
</head>
<body class="borda">
    <table align="center">
        <tr> 
            <td align="center">
<!-- Logo -->  
                <img src="Imagens/Logo.png" style="width: 150px; height: 150px;">
            </td>
        </tr>
        <tr>
<!-- Email -->
            <td style="font-size: 20px;">
                Email:
            </td>
        </tr>
        <tr>
            <td>
<!-- caixa de texto do email -->
                <input type="email" name="email" id="email" placeholder="Digite seu email">
            </td>
        </tr>
        <tr>
<!-- Senha -->
            <td style="font-size: 20px;">
                Senha:
            </td>
        </tr>
        <tr>
            <td>
<!-- caixa de texto da senha -->
                <input type="password" name="senha" id="senha" placeholder="Digite sua senha" > 
            </td>
        </tr>
<!-- Botão de Cadastrar -->
            <td align="center">
                <button type="button" value="cadastrar" style="font-size: 100%;" onclick="window.location.href='Tela_Login.html'">
                    Cadastrar
                </button>
            </td>
        </tr>
    </table>
</body>
<style>
    tr, td, th
        {
            border-bottom: none;
            border-top: none;
            border-left: none;
            border-right: none;
        }
</style>
</html>
