<!DOCTYPE html>
<html lang="en">
<head>

<body> 
    <!-- width: Largura  height: Altura -->
<!-- Tabela do Menu -->
    <table id="minhaTabela" border="1" style=" width: 20%; height: 99vh;" align="left">
<!-- Botão de Configurações -->
        <tr>
            <td align="center" style=" width: 10vw; height: 10vh;">
                <button type="button" onclick="menu()" style="width: 50%; height: 10vh;">
                     <img src="botao_configuracao.png" style="width: 5vw; height: 9vh;">   
                </button>
            </td>
        </tr>
        <tr>
<!-- Botão de Novo Pedido  -->
            <td align="center" style="width: 10vw; height: 10vh;"> 
                <button type="button" onclick="window.location.href='Tela_Carrinho.html'" style="width: 50%; height: 10vh;">
                    <img src="botao_novo_pedido.png" style="width: 5vw; height: 9vh;">
                </button>
            </td>
        </td>
        <tr>
<!-- Botão Estoque -->
            <td align="center" style="width: 10vw; height: 10vh;">
                <button type="button" onclick="estoque()" style="width: 50%; height: 10vh;">
                    <img src="botao_estoque.png" style="width: 5vw; height: 9vh;">

            </td>
        </tr>
        <tr>
<!-- Botão Sair -->
            <td align="center" style="width: 10vw; height: 10vh;">
                <button type="button" onclick="window.location.href='Tela_de_Login.html'" style="width: 50%; height: 10vh;">

                </button>
            </td>
        </tr>
        <tr>
            <td style="height: 60vh;">

            </td>
        </tr>
    </table>


<!-- Tabela Principal -->
    <table border="1" style="height: 99vh; width: 80%;" >
<!-- Botão Menu -->
        <tr>
            <td align="left" style="border-bottom: none; height: 10vh; width: 100%;">
                <button type="button" onclick="menu()">
                        <img src="botao_menu.png" style="width: 100%; height: 10vh;">   
                </button>
            </td>
        </tr>
<!-- Logo -->
    <tr>
        <td align="center" colspan="4" style="border-top: none; height: 90vh;">
            <img src="Logo.png" width="50%;" height="70%">    
        </td>
    </tr>
    </table>
</body>
<!-- Estilo para a tabela menu aparecer e desaparecer -->
<style>
     #minhaTabela 
        {
            display: none;
        }
    body
        {
            overflow: hidden;
        }
