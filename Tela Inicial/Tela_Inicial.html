<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>
    <script src="script.js"></script>
</head>
<body>

    <table id="minhaTabela" border="1" width="20%" height="600vh" align="left">
        <tr>
            <td>
                
            </td>
        </tr>
    </table>

<!-- Logo -->
        <tr>
            <td align="center">
                <img src="Logo.png" width="400" height="400">    
            </td>
        </tr>

            display: none;
        }

        }
