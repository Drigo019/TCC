<!DOCTYPE html >
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Documet</title>
    <link rel="stylesheet" href="css.css">
    <link rel="stylesheet" href="script.js">
</head>
<body class="borda"> 
    <table align="center" style="width: 10%; height:vh;">
        <tr>
            <td align="center">
<!-- Logo -->
                <img src="Imagens/Logo.png" style="width: 150px; height: 150px;"> 
            </td>
        </tr>
        <tr>
<!-- Email -->
            <td style="font-size: 125%; height: 10%;" align="left">
                Email:
            </td>
        </tr>
        <tr>
            <td style="width: 100%; height: 10%;">
<!-- Caixa de texto do email -->
                <input type="email" name="Email" id="Email" placeholder="Digite seu email">
            </td>
        </tr>
        <tr>
<!-- Senha -->
            <td style="font-size: 125%; height: 10%;">
                Senha:
            </td>
        </tr>
        <tr>
            <td style="height: 10%;">
<!-- Caixa de texto da senha -->
                <input type="password" name="Senha" id="Senha" placeholder="Digite sua senha">
            </td>
        </tr>
<!-- Espaçamento -->
        <tr style="height:10%;"></tr>
        <tr>
<!-- Botão de Entrar -->
            <td align="center">
                <button type="button" value="Entrar" style="font-size: 100%;" onclick="Cadastrar()">
                     Entrar
                </button>
                <button type="button" value="Entrar" style="font-size: 100%;" onclick="window.location.href='Tela_Inicial.html'">
                     Entrar.
                </button>
            </td>
        </tr>
</body>

<!-- Estilos -->
<style>
    .semborda
        {
           border-top: none; /* Tira a boda de cima */
            border-right: none; /* Tira a borda da direita */
            border-left: none; /* Tira a borda da esquerda */
            border-bottom: none; /* Tira a borda de baixo */ 
        }
    td, tr, th
        {   
            border-top: none; /* Tira a boda de cima */
            border-right: none; /* Tira a borda da direita */
            border-left: none; /* Tira a borda da esquerda */
            border-bottom: none; /* Tira a borda de baixo */
        }
</style>

<!-- Scripts -->
<script>
    function Cadastrar() 
    {
        // Exibe a caixa de confirmação
        let resposta = confirm("Login incorreto, você deseja fazer o cadastro?");
        
        // Se o cliente clicar em ok, isso faz com que ele vai para pagina de cadastro
        if (resposta) 
            {
                window.location.href='Tela_Cadastro.html';
            } 
        // Se o cliente clicar em cancelar que continua na pagina de Login
        else 
            {
                alert("Verifique se sua E-Mail/Senha esta correto");
            };
    }
</script>
</html>
